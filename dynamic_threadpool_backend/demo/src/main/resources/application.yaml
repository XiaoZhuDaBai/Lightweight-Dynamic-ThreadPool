server:
  port: 8080

spring:
  application:
    name: demo
  profiles:
    active: dev
  config:
    import: optional:nacos:dynamic-threadpool-demo.yaml
  cloud:
    nacos:
      config:
        server-addr: localhost:8848
        #        username: your-nacos-username
        #        password: your-nacos-password
        file-extension: yaml

logging:
  level:
    com.xiaozhu: DEBUG
    com.example.demo: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  metrics:
    tags:
      application: ${spring.application.name}
